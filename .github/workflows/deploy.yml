name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The live /api/chat route needs a server and can't be statically
      # exported. Remove it for the Pages build; the client falls back to the
      # in-browser knowledge-base responder. (The route stays in the repo for
      # server deploys like Vercel.)
      - name: Strip server-only API route for static export
        run: rm -rf app/api

      - name: Build static site
        env:
          STATIC_EXPORT: "true"
          NEXT_PUBLIC_STATIC_EXPORT: "true"
        run: npm run build

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
